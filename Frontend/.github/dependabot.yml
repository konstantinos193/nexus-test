version: 2
updates:
  # Frontend-specific dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    reviewers:
      - "your-github-username"
    assignees:
      - "your-github-username"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    ignore:
      # Major version updates for Web3 libraries require manual review
      - dependency-name: "@solana/web3.js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@metaplex-foundation/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ethers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "wagmi"
        update-types: ["version-update:semver-major"]
      - dependency-name: "viem"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@web3modal/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@phantom/react-sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "your-github-username"
    assignees:
      - "your-github-username"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
