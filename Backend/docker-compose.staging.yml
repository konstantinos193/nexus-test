version: '3.8'

services:
  backend:
    image: ghcr.io/yourusername/martech-backend:staging
    environment:
      NODE_ENV: staging
      WEB3_NETWORK: devnet
      DATABASE_URL: postgresql://martech_user:${DB_PASSWORD}@postgres:5432/martech_staging
      SOLANA_RPC_URL: ${SOLANA_DEVNET_RPC_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - martech-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: martech_staging
      POSTGRES_USER: martech_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - martech-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martech_user -d martech_staging"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_staging_data:/data
    networks:
      - martech-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  martech-staging:
    external: true
