name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.30.1'
  IMAGE: ghcr.io/martechnetworks/nexus-backend

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma validate

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: false
          provenance: false

  deploy:
    needs: [quality, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'staging' }}
    env:
      ENV: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 300s
          command_timeout: 240s
          script: |
            set -e
            IMAGE="ghcr.io/martechnetworks/nexus-backend"
            ENV="${{ env.ENV }}"
            ENV_FILE="/var/www/nexus-backend/.env.$ENV"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:${{ github.sha }}

            DOCKER_ENV="/tmp/nexus-backend-$ENV.env"
            grep -v '^#' $ENV_FILE | grep -v '^$' | sed "s/^export //; s/='\(.*\)'$/=\1/; s/=\"\(.*\)\"$/=\1/" > $DOCKER_ENV

            PORT=$(grep "^PORT=" $DOCKER_ENV | cut -d= -f2 || echo "3001")
            PORT=${PORT:-3001}
            ALT_PORT=$((PORT + 10))

            docker run --rm --network host --env-file $DOCKER_ENV $IMAGE:${{ github.sha }} sh -c "npx prisma migrate deploy"

            docker rm -f nexus-backend-new 2>/dev/null || true
            docker run -d --name nexus-backend-new --restart no --network host --env-file $DOCKER_ENV -e PORT=$ALT_PORT $IMAGE:${{ github.sha }}

            HEALTHY=false
            DEADLINE=$(($(date +%s) + 60))
            WAIT=2
            while [ "$(date +%s)" -lt "$DEADLINE" ]; do
              if curl -sf http://localhost:$ALT_PORT/health; then
                HEALTHY=true; break
              fi
              sleep $WAIT
              WAIT=$((WAIT < 10 ? WAIT * 2 : 10))
            done

            if [ "$HEALTHY" != "true" ]; then
              docker logs nexus-backend-new --tail 50
              docker rm -f nexus-backend-new
              exit 1
            fi

            docker stop nexus-backend || true
            docker rm nexus-backend || true
            docker stop nexus-backend-new
            docker rm nexus-backend-new
            docker run -d --name nexus-backend --restart unless-stopped --network host --env-file $DOCKER_ENV $IMAGE:${{ github.sha }}

            DEADLINE=$(($(date +%s) + 30))
            WAIT=2
            while [ "$(date +%s)" -lt "$DEADLINE" ]; do
              if curl -sf http://localhost:$PORT/health; then echo "Live"; break; fi
              sleep $WAIT
              WAIT=$((WAIT < 8 ? WAIT * 2 : 8))
            done || { docker logs nexus-backend --tail 30; exit 1; }

            docker image prune -f
