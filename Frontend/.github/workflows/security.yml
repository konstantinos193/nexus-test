name: Security Scan - Frontend

on:
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Container Security Scanning
  container-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: frontend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Code Security Analysis
  code-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        run: |
          npm audit --audit-level moderate --json > npm-audit.json || true
          
      - name: Process npm audit results
        run: |
          if [ -f "npm-audit.json" ]; then
            echo "## npm Audit Results for Frontend" >> $GITHUB_STEP_SUMMARY
            critical=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.critical // 0')
            high=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.high // 0')
            moderate=$(cat npm-audit.json | jq -r '.metadata.vulnerabilities.moderate // 0')
            echo "- Critical: $critical" >> $GITHUB_STEP_SUMMARY
            echo "- High: $high" >> $GITHUB_STEP_SUMMARY
            echo "- Moderate: $moderate" >> $GITHUB_STEP_SUMMARY
          fi

  # Frontend Web3 Security Analysis
  web3-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check Web3 dependency security
        run: |
          echo "## Frontend Web3 Dependency Security" >> $GITHUB_STEP_SUMMARY
          
          # Check Solana dependencies
          echo "### Frontend Web3 Dependencies:" >> $GITHUB_STEP_SUMMARY
          solana_version=$(cat package.json | jq -r '.dependencies["@solana/web3.js"] // "not found"')
          metaplex_version=$(cat package.json | jq -r '.dependencies["@metaplex-foundation/mpl-token-metadata"] // "not found"')
          phantom_version=$(cat package.json | jq -r '.dependencies["@phantom/react-sdk"] // "not found"')
          echo "- @solana/web3.js: $solana_version" >> $GITHUB_STEP_SUMMARY
          echo "- @metaplex-foundation/mpl-token-metadata: $metaplex_version" >> $GITHUB_STEP_SUMMARY
          echo "- @phantom/react-sdk: $phantom_version" >> $GITHUB_STEP_SUMMARY
          
          # Check Ethereum dependencies
          echo "### Frontend Ethereum Dependencies:" >> $GITHUB_STEP_SUMMARY
          ethers_version=$(cat package.json | jq -r '.dependencies.ethers // "not found"')
          wagmi_version=$(cat package.json | jq -r '.dependencies.wagmi // "not found"')
          viem_version=$(cat package.json | jq -r '.dependencies.viem // "not found"')
          echo "- ethers: $ethers_version" >> $GITHUB_STEP_SUMMARY
          echo "- wagmi: $wagmi_version" >> $GITHUB_STEP_SUMMARY
          echo "- viem: $viem_version" >> $GITHUB_STEP_SUMMARY

  # Secret Scanning
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml
          report-path: gitleaks-report.json
          report-format: json
          
      - name: Process Gitleaks results
        run: |
          if [ -f "gitleaks-report.json" ]; then
            echo "## Secret Scan Results" >> $GITHUB_STEP_SUMMARY
            secrets_found=$(cat gitleaks-report.json | jq length)
            if [ $secrets_found -gt 0 ]; then
              echo "⚠️ **$secrets_found potential secrets found!**" >> $GITHUB_STEP_SUMMARY
              exit 1
            else
              echo "✅ No secrets found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No secrets found" >> $GITHUB_STEP_SUMMARY
          fi

  # License Compliance
  license-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install license checker
        run: npm install -g license-checker
        
      - name: Check licenses for Frontend
        run: |
          license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD' --json frontend-licenses.json || true
          
      - name: Process license results
        run: |
          echo "## License Compliance Results for Frontend" >> $GITHUB_STEP_SUMMARY
          if [ -f "frontend-licenses.json" ]; then
            non_compliant=$(cat frontend-licenses.json | jq -r '.[] | select(.licenses | type == "array" and (.licenses[] | contains("MIT") or contains("Apache") or contains("BSD") or contains("ISC") | not)) | .name')
            if [ -n "$non_compliant" ]; then
              echo "⚠️ **Non-compliant licenses found:**" >> $GITHUB_STEP_SUMMARY
              echo "$non_compliant" | while read line; do
                echo "- $line" >> $GITHUB_STEP_SUMMARY
              done
            else
              echo "✅ All licenses compliant" >> $GITHUB_STEP_SUMMARY
            fi
          fi
