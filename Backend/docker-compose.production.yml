version: '3.8'

services:
  backend:
    image: ghcr.io/yourusername/martech-backend:production
    environment:
      NODE_ENV: production
      WEB3_NETWORK: mainnet
      DATABASE_URL: postgresql://martech_user:${DB_PASSWORD}@postgres:5432/martech_production
      SOLANA_RPC_URL: ${SOLANA_MAINNET_RPC_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - martech-production
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/web3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: martech_production
      POSTGRES_USER: martech_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_production_data:/var/lib/postgresql/data
    networks:
      - martech-production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martech_user -d martech_production"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_production_data:/data
    networks:
      - martech-production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_production_data:
    driver: local
  redis_production_data:
    driver: local

networks:
  martech-production:
    external: true
