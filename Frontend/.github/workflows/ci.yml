name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  NODE_VERSION: 20
  PNPM_VERSION: 10.33.0
  IMAGE: ghcr.io/martechnetworks/nexus-frontend

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
        continue-on-error: true

  build:
    needs: checks
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://nexus-web3.com' }}
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL || 'https://api.nexus-web3.com' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 300s
          command_timeout: 240s
          script: |
            set -e
            IMAGE="ghcr.io/martechnetworks/nexus-frontend"
            ENV_FILE="/var/www/nexus-frontend/.env.staging"
            UPSTREAM_FILE="/etc/nginx/conf.d/nexus-frontend-upstream.conf"

            # Alternate between 3000 and 3010 each deploy (true blue-green)
            LIVE_PORT=$(docker inspect nexus-frontend --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep "^PORT=" | cut -d= -f2)
            LIVE_PORT=${LIVE_PORT:-3000}
            if [ "$LIVE_PORT" = "3000" ]; then STANDBY_PORT=3010; else STANDBY_PORT=3000; fi
            echo "Live port: $LIVE_PORT  Standby port: $STANDBY_PORT"

            echo "=== Pulling image ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:${{ github.sha }}

            DOCKER_ENV="/tmp/nexus-frontend.env"
            grep -v '^#' $ENV_FILE | grep -v '^$' | sed "s/^export //; s/='\(.*\)'$/=\1/; s/=\"\(.*\)\"$/=\1/" > $DOCKER_ENV

            echo "=== Starting new container on standby port $STANDBY_PORT ==="
            docker rm -f nexus-frontend-new 2>/dev/null || true
            docker run -d \
              --name nexus-frontend-new \
              --restart no \
              --network host \
              --env-file $DOCKER_ENV \
              -e PORT=$STANDBY_PORT \
              $IMAGE:${{ github.sha }}

            echo "=== Health checking new container ==="
            HEALTHY=false
            for i in $(seq 1 20); do
              if curl -sf --max-time 3 http://localhost:$STANDBY_PORT > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              echo "Attempt $i/20 failed, retrying in 3s..."
              sleep 3
            done

            if [ "$HEALTHY" != "true" ]; then
              docker logs nexus-frontend-new --tail 50
              docker rm -f nexus-frontend-new
              echo "New container failed — old container still serving on port $LIVE_PORT"
              exit 1
            fi

            echo "=== Switching traffic to new container (zero downtime) ==="
            printf 'upstream nexus_frontend {\n    server 127.0.0.1:%s;\n    keepalive 32;\n}\n' "$STANDBY_PORT" > $UPSTREAM_FILE
            nginx -s reload

            echo "=== Removing old container ==="
            docker stop nexus-frontend 2>/dev/null || true
            docker rm nexus-frontend 2>/dev/null || true

            echo "=== Promoting new container ==="
            docker rename nexus-frontend-new nexus-frontend
            docker update --restart unless-stopped nexus-frontend

            docker image prune -f
            # Keep only the two most recent frontend images
            docker images --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' \
              | grep "ghcr.io/martechnetworks/nexus-frontend" \
              | sort -k2 -r | tail -n +3 | awk '{print $1}' \
              | xargs -r docker rmi || true

            echo "=== Done — frontend live on port $STANDBY_PORT ==="
