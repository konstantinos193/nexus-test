name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.30.1'
  IMAGE: ghcr.io/martechnetworks/nexus-backend

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma validate

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: false
          provenance: false

  deploy:
    needs: [quality, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      ENV: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Trigger deploy via webhook
        run: |
          curl -sf --max-time 300 \
            -X POST http://${{ secrets.VPS_HOST }}:9000/hooks/nexus-deploy \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.VPS_DEPLOY_TOKEN }}" \
            -d "{\"sha\":\"${{ github.sha }}\",\"env\":\"${{ env.ENV }}\"}"
