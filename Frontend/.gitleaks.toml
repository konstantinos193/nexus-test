title = "Gitleaks Configuration"

# Extend the base (default) configuration
[extend]
useDefault = true

# Allowlist for commits, paths, and regexes
[allowlist]
description = "Global allowlist"

# Allow commits by message patterns
commits = [
  "(?i)(test|example|demo|sample|mock|fake|dummy|placeholder)",
  "(?i)(initial|setup|bootstrap|scaffold|template)",
  "(?i)(docs|documentation|readme|guide|tutorial|changelog)"
]

# Allow specific paths
paths = [
  "node_modules",
  ".next",
  "build",
  "dist"
]

# Allow specific regex patterns
regexes = [
  "(?i)(example|test|mock|sample|demo|sandbox|fake|dummy|placeholder)[_-]?(key|secret|token|password|private|seed|mnemonic)",
  "(?i)(your[_-]?)(key|secret|token|password|private|seed|mnemonic)[_-]?here",
  "^\\s*#.*[a-zA-Z0-9_-]{32,}",
  "\\$\\{[A-Z_]+\\}",
  "(localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|::1)",
  "(?i)(testnet|devnet|goerli|mumbai|sepolia|arbitrum-goerli|optimism-goerli)",
  "(?i)(example|sample|demo|test|mock|fake|dummy|placeholder)[_-]?(private|key|secret|token|seed|mnemonic)[=:]\\s*([a-zA-Z0-9_-]{10,})"
]
