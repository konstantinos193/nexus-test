# Nexus Launchpad — nginx reverse proxy configuration
#
# ALL traffic goes through Next.js. Next.js owns /api/* routes, including
# the IPFS upload proxy that injects the BACKEND_API_KEY before forwarding
# to NestJS. Do NOT add a separate location /api/ block pointing to the
# backend — that would bypass the proxy and break auth (401) and expose the
# backend API key requirement to the public internet.
#
# Copy to: /etc/nginx/sites-available/nexus
# Enable:  sudo ln -s /etc/nginx/sites-available/nexus /etc/nginx/sites-enabled/nexus
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

# Allow large NFT collection uploads.
# 500 MB covers ~2500 images at 200 KB each or ~5000 images at 100 KB each.
# Set at the http block level so it applies to all server blocks in this file.
client_max_body_size 500m;

server {
    listen 80;
    server_name test.nexus-web3.com;

    # Increase timeouts for large collection uploads that take time to stream.
    proxy_connect_timeout 120s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # Disable request buffering so large uploads stream through rather than
    # being held in nginx memory/disk before forwarding.
    proxy_request_buffering off;

    # Everything → Next.js (port 3000).
    # Next.js handles its own /api/* routes, including:
    #   POST /api/ipfs/upload/file       — single-file IPFS proxy
    #   POST /api/ipfs/upload/directory  — directory IPFS proxy (adds x-api-key)
    # The backend (NestJS, port 8000) is not reachable from this server block.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
